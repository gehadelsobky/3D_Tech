# ============================================================
#  3D Tech — Nginx Reverse Proxy Configuration
#
#  Install:
#    sudo cp nginx.conf /etc/nginx/sites-available/3dtech
#    sudo ln -s /etc/nginx/sites-available/3dtech /etc/nginx/sites-enabled/
#    sudo nginx -t && sudo systemctl reload nginx
#
#  SSL (after DNS is pointed):
#    sudo apt install certbot python3-certbot-nginx
#    sudo certbot --nginx -d yourdomain.com -d www.yourdomain.com
# ============================================================

server {
    listen 80;
    listen [::]:80;
    server_name yourdomain.com www.yourdomain.com;

    # Max upload size (match Express limit)
    client_max_body_size 10M;

    # Security headers (supplement Helmet)
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Gzip (Express also compresses, but Nginx is faster)
    gzip on;
    gzip_vary on;
    gzip_min_length 1024;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml image/svg+xml;

    # Proxy all requests to Express
    location / {
        proxy_pass http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;

        # Timeouts
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # Cache static assets served by Express (Vite hashed files)
    location /assets/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        expires 1y;
        add_header Cache-Control "public, immutable";
        access_log off;
    }

    # Cache uploaded files
    location /uploads/ {
        proxy_pass http://127.0.0.1:3001;
        proxy_set_header Host $host;
        expires 1d;
        add_header Cache-Control "public";
        access_log off;
    }

    # Block direct access to sensitive paths
    location ~ /\. {
        deny all;
        return 404;
    }
}
